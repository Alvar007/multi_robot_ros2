# Default Khepera IV demo teleoperation

Operation:
  mode: virtual     # physical, virtual, hybrid
  tool: Webots              # Gazebo, Webots
  world: KheperaIV_Individual.wbt 

Experience:
  type: test           # identification, formation, navigation

Architecture: 
  mode: distributed   # centralized, distributed_ros2, distributed
  node: 
    executable: none
    name: none
    pkg: none

CPU_Monitoring: 
  enable: True
  node: 
    executable: measure_process
    name: benchmark
    pkg: measure_process_ros2_pkg
  processes: webots-bin, driver, ros2

Interface: 
  enable: True
  rviz2: 
    enable: True
    node: 
      executable: rviz2
      name: rviz2
      pkg: rviz2
    file: default.rviz
  rqt: 
    enable: True
    node: 
      executable: rqt_gui
      name: interface
      pkg: rqt_gui
    file: default.perspective
  own: 
    enable: False
    node:
      name:
      pkg:
    file:

Data_Logging: 
  enable: False
  all: True
  name: date
  topics: /ros2_cpu /cpu_stats

Robots:
  Robot01:
    type: virtual
    name: khepera01
    control_mode: HighLevel
    positioning: Intern
    pose: 0.0 0.0 0.0 # x, y, theta
    agent_ip: '192.168.0.21' # "khepera01:21 ; khepera02:22 ; khepera03:19 ; khepera04:20"
    port_number: 50000
    camera: 'true'
    controller:
      type: ipc
      enable: True
      protocol: Continuous
      period: 0.01
      threshold:
        type: Constant
        co: 0.01
        ai: 0.0
    communication:
      type: Continuous
      threshold:
        type: Constant
        co: 0.01
        ai: 0.0
    local_pose:
      enable: True
      path: True
      T: 100
    local_twist:
      enable: False
      T: 50
    data:
      enable: False
      T: 20
    mars_data:
      enable: False
      T: 50
    task: 
      enable: False
      T: 100
      Onboard: False
      controller:
        type: gradient
        protocol: Continuous
        period: 0.1
        upperLimit: 0.1
        lowerLimit: -0.1
        gain: 0.05
        threshold:
            type: Constant
            co: 0.01
            ai: 0.0
      role: Null
      type: Null
      relationship: Null

Supervisor:
  enable: False
  node: 
    executable: supervisor_node
    name: supervisor
    pkg: mars_supervisor_pkg
    file: default_topics.yaml

Other:
  OpenLoop:
    enable: False
    executable: open_loop_signal
    name: open_loop
    pkg: uned_swarm_task
    file: file.yaml